<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dash: Classroom Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <form id="login-form" class="card">
            <h2>Classroom Login</h2>
            <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 1rem;">Enter your username and password</p>
            <input type="text" id="username-input" name="username" autocomplete="username" placeholder="Username" required>
            <input type="password" id="password-input" name="password" autocomplete="current-password" placeholder="Password" required>
            <button type="submit" id="login-btn">Login</button>
            <p style="margin-top: 15px; font-size: 0.75rem;">
                First time? <a href="#" id="show-setup-link">Set your password here.</a>
            </p>
        </form>

        <form id="setup-form" class="card" style="display: none;">
            <h2>Set Password</h2>
            <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 1rem;">Choose a password you'll remember.</p>
            <input type="text" id="setup-username" placeholder="Confirm Username" required>
            <input type="password" id="setup-password" placeholder="New Password" required>
            <button type="submit" style="background: var(--secondary, #3b82f6);">Save Password</button>
            <p style="margin-top: 15px; font-size: 0.75rem;">
                <a href="#" id="show-login-link">Back to Login</a>
            </p>
        </form>
    </div>

    <main id="app" style="display: none;">
        <header id="dashboard">
            <div id="user-info">
                <span id="student-name">Loading...</span>
                <button id="logout-btn" class="secondary-btn">Switch User</button>
            </div>
            <p id="instruction-text"></p>
            <div id="mastery-grid"></div>
            <div id="controls">
                <button id="start-drill-btn" disabled>Start Drill</button>
                <button id="stop-drill-btn" style="display: none;">Change Categories</button>
            </div>
        </header>

        <hr>

        <section id="question-container" style="display: none;">
            <span id="category-tag">--</span>
            <h2 id="question">--</h2>
            <form id="answer-form" class="input-group">
                <input type="number" id="answer-input" name="math-answer" placeholder="?" autocomplete="off" step="any" required>
                <button type="submit" id="submit-btn">Submit</button>
            </form>
        </section>
        
        <footer id="status-footer" style="display: none;">
            <p id="status-msg">Ready!</p>
        </footer>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
