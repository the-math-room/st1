<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dash: Classroom Edition</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="app-shell">
        <form id="login-form" class="card auth-card" method="post">
            <h2>Classroom Login</h2>
            <p class="text-muted text-sm form-intro">Enter your student credentials</p>

            <input
                type="text"
                id="username-input"
                name="username"
                autocomplete="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="password-input"
                name="password"
                autocomplete="current-password"
                placeholder="Password"
                required
            >

            <button type="submit">Login</button>
        </form>

        <form id="setup-form" class="card auth-card is-hidden" method="post">
            <h2>Update Password</h2>
            <p class="text-info text-sm form-intro">Teacher has authorized a password change.</p>

            <input
                type="text"
                id="setup-username"
                placeholder="Username"
                required
                readonly
            >

            <input
                type="password"
                id="setup-password"
                placeholder="New Password"
                required
            >

            <button type="submit">Save & Continue</button>
        </form>
    </div>

    <main id="app" class="app-shell is-hidden">
        <section id="teacher-panel" class="is-hidden">
            <header class="section-header">
                <h2>Teacher Dashboard</h2>
                <button id="teacher-logout" class="secondary-btn" type="button">Logout</button>
            </header>

            <div id="add-student-container" class="card panel panel--dashed">
                <h3 class="panel-title">Register New Student</h3>

                <form id="add-student-form" class="stack-form">
                    <div class="form-group">
                        <label for="new-student-name">Full Name</label>
                        <input type="text" id="new-student-name" placeholder="e.g. Jane Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="new-student-username">Username</label>
                        <input type="text" id="new-student-username" placeholder="e.g. janed123" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="new-student-pass">Temp Password</label>
                            <input type="text" id="new-student-pass" placeholder="math123" required>
                        </div>

                        <div class="form-group">
                            <label for="new-student-class">Class</label>
                            <select id="new-student-class" required>
                                <option value="">Select...</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="teacher-submit-btn">Create Student Account</button>
                </form>
            </div>

            <div id="bulk-import-container" class="card panel panel--compact">
                <h4 class="label">Bulk Import (CSV)</h4>
                <p class="text-muted text-xs panel-note">Format: name, username, password</p>

                <input type="file" id="csv-file-input" accept=".csv" class="file-input">

                <button id="upload-csv-btn" class="secondary-btn button-block" type="button">
                    Upload Student List
                </button>
            </div>

            <div id="admin-student-list" class="student-list"></div>
        </section>

        <section id="student-view">
            <header id="dashboard" class="section-header">
                <div id="user-info">
                    <span id="student-name">Loading...</span>
                    <button id="logout-btn" class="secondary-btn" type="button">Switch User</button>
                </div>

                <p id="instruction-text"></p>

                <div id="mastery-grid"></div>

                <div id="controls">
                    <button id="start-drill-btn" type="button" disabled>Start Drill</button>
                    <button id="stop-drill-btn" class="is-hidden" type="button">Change Categories</button>
                </div>
            </header>

            <hr>

            <section id="question-container" class="is-hidden">
                <span id="category-tag">--</span>
                <div id="question">--</div>

                <form id="answer-form" class="input-group" method="post">
                    <input
                        type="number"
                        id="answer-input"
                        name="math-result-field"
                        placeholder="?"
                        autocomplete="off"
                        data-lpignore="true"
                        data-1p-ignore
                        step="any"
                        required
                    >
                    <button type="submit" id="submit-btn">Submit</button>
                </form>
                
                <p id="status-msg" class="text-sm"></p>
            </section>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
